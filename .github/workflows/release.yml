name: Release

# Direct-push release (no version PR), modeled on PostHog/posthog-rs but using
# changesets. A changeset landing on main triggers this; a human approves via the
# Release environment, then the version bump is committed straight to main and the
# package is published to npm with trusted publishing (OIDC).

on:
  push:
    branches: [main]
    paths:
      - ".changeset/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-changesets:
    name: Check for changesets
    runs-on: ubuntu-latest
    outputs:
      has-changesets: ${{ steps.check.outputs.has-changesets }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
      - name: Check for changesets
        id: check
        run: |
          count=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "has-changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found $count changeset(s), ready to release"
          else
            echo "has-changesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets to release"
          fi

  notify-approval-needed:
    name: Notify Slack - Approval Needed
    needs: check-changesets
    if: needs.check-changesets.outputs.has-changesets == 'true'
    uses: posthog/.github/.github/workflows/notify-approval-needed.yml@5fc4680761e8ac29a61b212756230eba0e276d8c
    with:
      slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
      slack_user_group_id: ${{ vars.GROUP_CLIENT_LIBRARIES_SLACK_GROUP_ID }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
      posthog_project_api_key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}

  release:
    name: Release and publish
    needs: [check-changesets, notify-approval-needed]
    if: always() && needs.check-changesets.outputs.has-changesets == 'true'
    runs-on: ubuntu-latest
    environment: Release # required reviewers gate (client-libraries-approvers)
    permissions:
      contents: write # commit the version bump + create the release/tag
      id-token: write # npm trusted publishing (OIDC)
    outputs:
      published: ${{ steps.publish.outputs.published }}
      version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Notify Slack - Approved
        if: needs.notify-approval-needed.outputs.slack_ts != ''
        uses: posthog/.github/.github/actions/slack-thread-reply@5fc4680761e8ac29a61b212756230eba0e276d8c
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "✅ Release approved! Version bump in progress..."
          emoji_reaction: "white_check_mark"

      - name: Get GitHub App token
        id: releaser
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.HEDGEHOGS_RELEASER_APP_ID }}
          private-key: ${{ secrets.HEDGEHOGS_RELEASER_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.releaser.outputs.token }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure npm supports trusted publishing (OIDC)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Bump version and changelog
        id: version
        run: |
          pnpm changeset version
          new_version=$(node -p "require('./package.json').version")
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "Releasing v$new_version"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # Commit the version bump + changelog directly to main (verified API commit,
      # no PR). [skip ci] avoids re-triggering CI for the bump itself.
      - name: Commit version bump to main
        if: steps.changes.outputs.committed == 'true'
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde
        with:
          commit_message: "chore: release v${{ steps.version.outputs.new_version }} [skip ci]"
          repo: ${{ github.repository }}
          branch: main
        env:
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}

      # ghcommit committed via the API, so the local tree is still dirty and ahead
      # is on the remote. Reset to the just-pushed commit before publishing.
      - name: Sync local repository
        run: |
          git checkout -- .
          git pull origin main

      - name: Publish to npm (trusted publishing)
        id: publish
        run: |
          pnpm changeset publish
          echo "published=true" >> "$GITHUB_OUTPUT"
        env:
          NPM_CONFIG_PROVENANCE: "true"
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          CHANGELOG_ENTRY=$(awk -v defText="see CHANGELOG.md" '/^## /{if (flag) exit; flag=1; next} flag; END{if (!flag) print defText}' CHANGELOG.md | sed '/[^[:space:]]/,$!d' | tac | sed '/[^[:space:]]/,$!d' | tac)
          gh release create "v$NEW_VERSION" --target main --title "v$NEW_VERSION" --notes "$CHANGELOG_ENTRY"

      - name: Send failure event to PostHog
        if: ${{ failure() }}
        uses: PostHog/posthog-github-action@58dea254b598fb5d469c0699c98af8288a7f7650 # v1.2.0
        with:
          posthog-token: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          event: "hedgehogs-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "version": "${{ steps.version.outputs.new_version }}"
            }

      - name: Notify Slack - Failed
        if: ${{ failure() && needs.notify-approval-needed.outputs.slack_ts != '' }}
        uses: posthog/.github/.github/actions/slack-thread-reply@5fc4680761e8ac29a61b212756230eba0e276d8c
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "❌ Failed to release `@posthog/hedgehogs@${{ steps.version.outputs.new_version }}`! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          emoji_reaction: "x"

  notify-released:
    name: Notify Slack - Released
    needs: [check-changesets, notify-approval-needed, release]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success' && needs.notify-approval-needed.outputs.slack_ts != ''
    steps:
      - name: Notify Slack - Released
        uses: posthog/.github/.github/actions/slack-thread-reply@5fc4680761e8ac29a61b212756230eba0e276d8c
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "🚀 `@posthog/hedgehogs@${{ needs.release.outputs.version }}` released successfully!"
          emoji_reaction: "rocket"
