name: Migration report

# Posts the SVG-vs-PNG migration status to Slack every Monday morning — but only
# if the repo saw commits in the past week (no point reporting an unchanged catalog).

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-activity:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.activity.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: activity
        run: |
          count=$(git rev-list --count --since="7 days ago" HEAD)
          echo "Commits in the last 7 days: $count"
          if [ "$count" -gt 0 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  report:
    needs: check-activity
    if: needs.check-activity.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Post SVG-vs-PNG migration status to Slack
        run: pnpm migration-report
        env:
          SLACK_HEDGEHOGS_WEBHOOK_URL: ${{ secrets.SLACK_HEDGEHOGS_WEBHOOK_URL }}
